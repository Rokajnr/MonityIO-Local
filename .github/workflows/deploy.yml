name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy CMS &  Website
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -eo pipefail

            echo "=== Starting deployment ==="
            cd ${{ secrets.REMOTE_PATH }}
            echo "Changed to directory ${{ secrets.REMOTE_PATH }}"

            # 1. Clean local state and fetch latest code to avoid conflicts
            git config --global --add safe.directory ${{ secrets.REMOTE_PATH }}

            echo "Fetching latest changes..."
            git fetch https://x-access-token:${{ secrets.GH_PAT }}@github.com/MonityIO/website.git main
            git reset --hard FETCH_HEAD

            # 2. Build and restart containers in background
            echo "Rebuilding and restarting Docker containers..."
            docker compose up -d --build --remove-orphans

            # 3. Post-deployment health verification loop
            echo "Verifying deployment health..."
            HEALTHY=false
            # Strapi's healthcheck allows up to a 240s boot window, so poll for
            # ~5 minutes (60 * 5s) to avoid failing the deploy while it boots.
            for i in {1..60}; do
              # Count how many containers are reported as "(healthy)" by Docker Compose
              HEALTHY_COUNT=$(docker compose ps | grep -o "healthy" | wc -l || true)

              if [ "$HEALTHY_COUNT" -eq "2" ]; then
                echo "All containers are healthy!"
                HEALTHY=true
                break
              fi

              echo "Waiting for containers to boot... status: $HEALTHY_COUNT/2 healthy ($((i*5))s elapsed)"
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "::error::Deployment failed! One or more containers are unhealthy."
              echo "=== Docker Compose Status ==="
              docker compose ps
              echo "=== Recent Container Logs ==="
              docker compose logs --tail=50
              exit 1
            fi

            # 4. Clean up dangling images to free disk space
            echo "Pruning unused Docker assets..."
            docker image prune -f

            echo "=== Deployment successfully completed! ==="
