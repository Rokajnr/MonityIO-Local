name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy CMS &  Website
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -eo pipefail

            echo "=== Starting deployment ==="
            cd ${{ secrets.REMOTE_PATH }}
            echo "Changed to directory ${{ secrets.REMOTE_PATH }}"

            # 1. Clean local state and fetch latest code to avoid conflicts
            git config --global --add safe.directory ${{ secrets.REMOTE_PATH }}

            echo "Fetching latest changes..."
            git fetch https://x-access-token:${{ secrets.GH_PAT }}@github.com/MonityIO/website.git main
            git reset --hard FETCH_HEAD

            # 2. Restart containers using existing images and wait for health.
            # --wait blocks until every container is healthy/running and exits
            # non-zero if any doesn't make it within the timeout. The 300s window
            # covers Strapi's 240s healthcheck boot allowance.
            echo "Restarting Docker containers (waiting for health)..."
            if ! docker compose up -d --remove-orphans --wait --wait-timeout 300; then
              echo "::error::Deployment failed! One or more containers did not become healthy."
              echo "=== Docker Compose Status ==="
              docker compose ps
              echo "=== Recent Container Logs ==="
              docker compose logs --tail=50
              exit 1
            fi

            # 3. Clean up dangling images to free disk space
            echo "Pruning unused Docker assets..."
            docker image prune -f

            echo "=== Deployment successfully completed! ==="
