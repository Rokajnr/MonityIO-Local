name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - "server/**"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - "ecosystem.config.js"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (CMS then Website)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -eo pipefail

            echo "=== Starting deployment ==="

            # Load nvm (not sourced automatically in non-interactive shells)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ secrets.REMOTE_PATH }}
            echo "Changed to directory ${{ secrets.REMOTE_PATH }}"

            # 1. Fetch latest code, recording HEAD before/after to detect changes
            git config --global --add safe.directory ${{ secrets.REMOTE_PATH }}
            BEFORE="$(git rev-parse HEAD 2>/dev/null || echo '')"
            echo "Fetching latest changes..."
            git fetch https://x-access-token:${{ secrets.GH_PAT }}@github.com/MonityIO/website.git main
            git reset --hard FETCH_HEAD
            AFTER="$(git rev-parse HEAD)"

            # 2. Decide what to build. Shared files (root manifests, .nvmrc,
            #    ecosystem) force a rebuild of both apps. No prior commit or a
            #    manual run rebuilds everything to be safe.
            BUILD_SERVER=false
            BUILD_CLIENT=false
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "$AFTER" ]; then
              echo "No baseline commit (or unchanged) -> building everything."
              BUILD_SERVER=true
              BUILD_CLIENT=true
            else
              CHANGED="$(git diff --name-only "$BEFORE" "$AFTER")"
              echo "Changed files:"
              echo "$CHANGED"
              echo "$CHANGED" | grep -qE '^server/' && BUILD_SERVER=true
              echo "$CHANGED" | grep -qE '^client/' && BUILD_CLIENT=true
              if echo "$CHANGED" | grep -qE '^(package\.json|package-lock\.json|\.nvmrc|ecosystem\.config\.js)$'; then
                BUILD_SERVER=true
                BUILD_CLIENT=true
              fi
            fi
            echo "BUILD_SERVER=$BUILD_SERVER  BUILD_CLIENT=$BUILD_CLIENT"

            # 3. Match Node version pinned in .nvmrc and install root tooling (pm2)
            echo "Selecting Node version from .nvmrc..."
            nvm install
            nvm use
            npm ci --omit=dev

            # 4. Build everything first; a failed build aborts the deploy before
            #    any process is reloaded, leaving the running apps untouched.
            if [ "$BUILD_SERVER" = "true" ]; then
              echo "=== Building CMS (Strapi server) ==="
              ( cd server && npm ci && NODE_ENV=production npm run build )
            fi
            if [ "$BUILD_CLIENT" = "true" ]; then
              echo "=== Building Website (Next.js client) ==="
              echo "NEXT_PUBLIC_* vars are read from client/.env.production at build time."
              ( cd client && npm ci && NODE_ENV=production npm run build )
            fi

            # 5. Reload under pm2 -- CMS first, website last.
            if [ "$BUILD_SERVER" = "true" ]; then
              echo "Reloading CMS via pm2..."
              npx pm2 reload ecosystem.config.js --only monity-server --update-env \
                || npx pm2 start ecosystem.config.js --only monity-server
            fi
            if [ "$BUILD_CLIENT" = "true" ]; then
              echo "Reloading website via pm2..."
              npx pm2 reload ecosystem.config.js --only monity-client --update-env \
                || npx pm2 start ecosystem.config.js --only monity-client
            fi
            npx pm2 save

            echo "=== Deployment successfully completed! ==="
