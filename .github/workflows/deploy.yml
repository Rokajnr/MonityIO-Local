name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - "server/**"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - "ecosystem.config.js"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (CMS then Website)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -eo pipefail

            echo "=== Starting deployment ==="

            # Load nvm (not sourced in non-interactive shells)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ secrets.REMOTE_PATH }}

            # 1. Fetch latest code
            git config --global --add safe.directory ${{ secrets.REMOTE_PATH }}
            git fetch https://x-access-token:${{ secrets.GH_PAT }}@github.com/MonityIO/website.git main
            git reset --hard FETCH_HEAD

            # 2. Match .nvmrc Node version and install root tooling (pm2)
            nvm install
            nvm use
            npm ci --omit=dev

            # 3. Ensure swap (1 GB host can't build without spilling to swap).
            #    Best-effort: warns and continues if there's no passwordless sudo.
            if [ "$(swapon --show=NAME --noheadings | wc -l)" -eq 0 ]; then
              if sudo -n true 2>/dev/null; then
                if [ ! -f /swapfile ]; then
                  sudo fallocate -l 2G /swapfile 2>/dev/null \
                    || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
                  sudo chmod 600 /swapfile
                  sudo mkswap /swapfile
                fi
                sudo swapon /swapfile && echo "Swap enabled (2G)."
              else
                echo "::warning::No swap and no passwordless sudo; build may OOM. Add swap on the host (see README)."
              fi
            fi

            # Let Node's heap grow into swap; lowering this re-triggers the OOM.
            export NODE_OPTIONS="--max-old-space-size=2048"

            # 4. Build sequentially, CMS then website (one at a time caps memory).
            #    A failed build aborts the deploy before any process is reloaded.
            echo "=== Building CMS (Strapi server) ==="
            ( cd server && npm ci && NODE_ENV=production npm run build )

            echo "=== Building Website (Next.js client) ==="
            ( cd client && npm ci && NODE_ENV=production npm run build )

            # 5. Reload under pm2 -- CMS first, website last
            echo "Reloading CMS via pm2..."
            npx pm2 reload ecosystem.config.js --only monity-server --update-env \
              || npx pm2 start ecosystem.config.js --only monity-server

            echo "Reloading website via pm2..."
            npx pm2 reload ecosystem.config.js --only monity-client --update-env \
              || npx pm2 start ecosystem.config.js --only monity-client

            npx pm2 save

            echo "=== Deployment successfully completed! ==="
