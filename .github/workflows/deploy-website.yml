name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - 'ecosystem.config.js'
      - '.github/workflows/deploy-website.yml'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Website (Client)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -eo pipefail

            echo "=== Starting Website deployment ==="

            # Load nvm (not sourced automatically in non-interactive shells)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ secrets.REMOTE_PATH }}
            echo "Changed to directory ${{ secrets.REMOTE_PATH }}"

            # 1. Clean local state and fetch latest code to avoid conflicts
            git config --global --add safe.directory ${{ secrets.REMOTE_PATH }}
            echo "Fetching latest changes..."
            git fetch https://x-access-token:${{ secrets.GH_PAT }}@github.com/MonityIO/website.git main
            git reset --hard FETCH_HEAD

            # 2. Match Node version pinned in .nvmrc
            echo "Selecting Node version from .nvmrc..."
            nvm install
            nvm use

            # 3. Install root tooling (pm2) from lockfile
            npm ci --omit=dev

            # 4. Build the Next.js client
            #    NEXT_PUBLIC_* vars are read from client/.env.production at build time.
            echo "Building Next.js client..."
            cd client
            npm ci
            NODE_ENV=production npm run build
            cd ..

            # 5. Reload (or start) the client process under pm2
            echo "Reloading client via pm2..."
            npx pm2 reload ecosystem.config.js --only monity-client --update-env \
              || npx pm2 start ecosystem.config.js --only monity-client
            npx pm2 save

            echo "=== Website Deployment successfully completed! ==="
