services:
  # Next.js Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_STRAPI_API_URL=${NEXT_PUBLIC_STRAPI_API_URL}
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN}
      - NEXT_PUBLIC_STRAPI_API_URL=${NEXT_PUBLIC_STRAPI_API_URL}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Strapi Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:1337:1337"
    environment:
      - HOST=0.0.0.0
      - PORT=1337
      - PUBLIC_URL=${NEXT_PUBLIC_STRAPI_API_URL}
      - APP_KEYS=${APP_KEYS}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_CLIENT=${DATABASE_CLIENT:-mysql}
      - DATABASE_HOST=${DATABASE_HOST:-host.docker.internal}
      - DATABASE_PORT=${DATABASE_PORT:-3306}
      - DATABASE_NAME=${DATABASE_NAME:-strapi}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-strapi}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-strapi}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - DATABASE_FILENAME=${DATABASE_FILENAME:-.tmp/data.db}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - strapi-db:/opt/app/.tmp
      - strapi-uploads:/opt/app/public/uploads
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1337"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 240s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  strapi-db:
  strapi-uploads:
